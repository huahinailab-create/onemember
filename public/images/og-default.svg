<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2E5A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1e3d;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="#FF1585" fill-opacity="0.08"/>
  <circle cx="150" cy="530" r="120" fill="#FF1585" fill-opacity="0.05"/>

  <!-- Logo wordmark -->
  <text x="600" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="700" text-anchor="middle">
    <tspan fill="#FF1585">one</tspan><tspan fill="#FFFFFF">member</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#94a3b8" text-anchor="middle">
    Loyalty Platform for Thai Businesses
  </text>

  <!-- CTA pill -->
  <rect x="450" y="380" width="300" height="64" rx="32" fill="#FF1585"/>
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#FFFFFF" text-anchor="middle">Start Free Trial</text>

  <!-- Domain -->
  <text x="600" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#64748b" text-anchor="middle">onemember.co</text>
</svg>
